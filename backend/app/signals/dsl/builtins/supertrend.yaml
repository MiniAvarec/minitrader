name: "SuperTrend"
description: |
  Mechanical trend signal: long when SuperTrend(15m) flips to +1, short when -1.
  Uses ATR(10) and multiplier 3.0 (TradingView defaults).
timeframes: ["15m"]
cooldown_min: 15
params:
  length: 10
  mult: 3.0

entry:
  long:
    lhs: { supertrend: ["15m", 10, 3.0] }
    op: "crosses_above"
    rhs: 0
  short:
    lhs: { supertrend: ["15m", 10, 3.0] }
    op: "crosses_below"
    rhs: 0

sl: { atr_mult: 2.0, tf: "15m" }
tp: { atr_mult: 3.0, tf: "15m" }
news_modifier: { allow_veto: true, allow_boost: false }
