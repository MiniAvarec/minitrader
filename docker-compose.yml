services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ./backend:/code

  ingestor:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.data.streams.manager"]
    volumes:
      - ./backend:/code

  instruments:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.data.instruments_refresh"]
    volumes:
      - ./backend:/code

  fillstream:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.fill_stream"]
    volumes:
      - ./backend:/code

  signals:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.signals.worker"]
    volumes:
      - ./backend:/code

  news:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.data.news_worker"]
    volumes:
      - ./backend:/code

  telegram:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["python", "-m", "app.telegram.bot"]
    volumes:
      - ./backend:/code

  executor:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.executor"]
    volumes:
      - ./backend:/code

  tracker:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.tracker"]
    volumes:
      - ./backend:/code

  # Interactive Brokers TWS / IB Gateway sidecar. Connects to the backend over
  # ports 4002 (paper) / 4001 (live). First run needs an interactive 2FA seed —
  # see the README "IBKR setup" section. The image bundles IBC for auto-restart.
  # Optional: only start with `docker compose up ibgateway` (or include it in
  # your default `up` if you actively trade on IBKR).
  ibgateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: unless-stopped
    environment:
      TWS_USERID: ${IB_USERID:-}
      TWS_PASSWORD: ${IB_PASSWORD:-}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      READ_ONLY_API: "no"
      TWS_ACCEPT_INCOMING: accept
    ports:
      - "4002:4002"
      - "4001:4001"
    volumes:
      - ibgateway-settings:/root/Jts
    profiles:
      - ibkr

  # Exness MT5 gateway sidecar. Runs the MetaTrader 5 terminal under Wine plus
  # the mt5linux RPyC server on :18812. Exness has no REST API, so this is the
  # only integration path (analogous to ibgateway). EXNESS_* seed a default
  # session for the credential-less public path (instruments refresh); keyed
  # users log in per-key from the backend. First run may need an interactive
  # 2FA/login — see the README "Exness / MT5 setup" section.
  # Optional: only start with `docker compose --profile exness up mt5gateway`.
  mt5gateway:
    build:
      context: ./mt5gateway
    restart: unless-stopped
    environment:
      EXNESS_LOGIN: ${EXNESS_LOGIN:-}
      EXNESS_PASSWORD: ${EXNESS_PASSWORD:-}
      EXNESS_SERVER: ${EXNESS_SERVER:-}
      MT5_BRIDGE_PORT: "18812"
    ports:
      - "18812:18812"
    volumes:
      - mt5gateway-data:/root/.wine
    profiles:
      - exness

  frontend:
    # Stop at the `build` stage (node:20-alpine with deps installed) so the
    # dev server can run. The default final stage is nginx, which has no npm.
    build:
      context: ./frontend
      target: build
    env_file: .env
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./frontend:/code
      - /code/node_modules

volumes:
  pgdata:
  ibgateway-settings:
  mt5gateway-data:
