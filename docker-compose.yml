services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ./backend:/code

  ingestor:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.data.streams.manager"]
    volumes:
      - ./backend:/code

  instruments:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.data.instruments_refresh"]
    volumes:
      - ./backend:/code

  fillstream:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.fill_stream"]
    volumes:
      - ./backend:/code

  signals:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.signals.worker"]
    volumes:
      - ./backend:/code

  news:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.data.news_worker"]
    volumes:
      - ./backend:/code

  telegram:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["python", "-m", "app.telegram.bot"]
    volumes:
      - ./backend:/code

  executor:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.executor"]
    volumes:
      - ./backend:/code

  tracker:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.orders.tracker"]
    volumes:
      - ./backend:/code

  frontend:
    # Stop at the `build` stage (node:20-alpine with deps installed) so the
    # dev server can run. The default final stage is nginx, which has no npm.
    build:
      context: ./frontend
      target: build
    env_file: .env
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ./frontend:/code
      - /code/node_modules

volumes:
  pgdata:
