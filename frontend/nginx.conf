server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — anything that isn't a static asset returns index.html
    # so client-side routing works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed Vite assets.
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Re-resolve the backend hostname via Docker's embedded DNS instead of
    # caching its IP at startup. Without this, recreating the backend
    # container (new docker IP) makes nginx keep proxying to the dead old IP
    # and every request 502s until the frontend is restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API proxy to the backend container on the docker network.
    location /api/ {
        # Variable in proxy_pass forces per-request resolution via `resolver`.
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # WebSocket upgrade for /ws/live.
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 1h;
    }
}
